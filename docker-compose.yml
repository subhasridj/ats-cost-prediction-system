version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: atsdb
    ports:
      - "5432:5432"
  backend:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://ats:ats@db:5432/atsdb
    depends_on:
      - db
